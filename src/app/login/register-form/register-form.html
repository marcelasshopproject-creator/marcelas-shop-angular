<form class="max-w-sm mx-auto text-center">
    <div class="mb-5">
      <label for="fullname" class="block text-left mb-2 text-sm font-medium text-gray-900"
        >Tu Nombre</label
      >
      <input
        type="text"
        id="fullname"
        class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5"
        placeholder="name@email.com"
        required
      />
    </div>
    <div class="mb-5">
        <label for="address" class="block text-left mb-2 text-sm font-medium text-gray-900"
          >Dirección</label
        >
        <input
          type="text"
          id="address"
          class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5"
          placeholder="name@email.com"
          required
        />
      </div>
      <div class="mb-5">
        <label for="phone" class="block text-left mb-2 text-sm font-medium text-gray-900"
          >Teléfono</label
        >
        <input
          type="phone"
          id="phone"
          class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5"
          placeholder="name@email.com"
          required
        />
      </div>
    <div class="mb-5">
        <label for="email" class="block text-left mb-2 text-sm font-medium text-gray-900"
          >Tu Email</label
        >
        <input
          type="email"
          id="email"
          class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5"
          placeholder="name@email.com"
          required
        />
      </div>
    <div class="mb-5">
      <label for="password" class="block text-left mb-2 text-sm font-medium text-gray-900"
        >contraseña</label
      >
      <input
        type="password"
        id="password"
        class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5"
        required
      />
    </div>
    <div class="mb-5">
        <label for="password-repeat" class="block text-left mb-2 text-sm font-medium text-gray-900"
          >Repite la contraseña</label
        >
        <input
          type="password"
          id="password-repeat"
          class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5"
          required
        />
      </div>
    <button
      type="submit"
      class="max-auto text-white bg-pink-500 hover:bg-pink-900 focus:ring-4 focus:outline-none focus:ring-blue-300 font-medium rounded-lg text-sm w-full sm:w-auto px-5 py-2.5 text-center"
    >
      Registrar
    </button>
  </form>
